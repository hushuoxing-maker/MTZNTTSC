        .main-layout { display: flex; gap: 18px; width: 100%; max-width: 1400px; align-items: flex-start; }

        .generate-btn {

            box-shadow:0 10px 22px rgba(185,131,255,0.3);

        .generate-btn:hover { filter:brightness(1.05); transform:translateY(-2px); }
        .generate-btn:disabled { opacity:0.5; transform:none; pointer-events:none; }
        .result-grid { flex:1; overflow-y:auto; padding-right:4px; display:flex; flex-direction:column; gap:10px; }
        .result-grid::-webkit-scrollbar { width:4px; }
        .result-grid::-webkit-scrollbar-thumb { background:rgba(185,131,255,0.3); border-radius:8px; }
        .card {
            background:rgba(255,255,255,0.85); backdrop-filter:blur(10px); border-radius:16px;
            padding:14px; border:1px solid rgba(200,170,210,0.3); transition:0.2s;
            display:flex; flex-direction:column; gap:8px;
        }
        .card-header { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
        .card-number {
            background:linear-gradient(135deg, #b983ff, #e786a7); color:white;
            width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-weight:700; font-size:0.72rem; flex-shrink:0;
        }
        .card-badge { background:rgba(185,131,255,0.12); color:#7c3aed; font-size:0.65rem; padding:2px 7px; border-radius:9px; font-weight:600; white-space:nowrap; }
        .card-badge.green { background:rgba(134,200,167,0.15); color:#3d7a5c; }
        .prompt-text { font-size:0.78rem; line-height:1.55; color:#2e1e33; white-space:pre-wrap; word-break:break-word; background:rgba(245,235,250,0.4); padding:10px; border-radius:10px; }
        .copy-btn {
            align-self:flex-end; background:linear-gradient(135deg, #b983ff, #e786a7); border:none;
            color:white; padding:6px 12px; border-radius:20px; font-weight:600; font-size:0.72rem;
            cursor:pointer; transition:0.2s; letter-spacing:0.3px;
        }
        .copy-btn:hover { transform:scale(1.04); }
        .copy-btn.copied { background:#9b8aac; pointer-events:none; }
        .empty-state { text-align:center; padding:50px 20px; color:#b0a0b5; font-size:0.9rem; }
        select {
